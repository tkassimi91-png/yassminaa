<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Happy Eid ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  color: white;
  text-align: center;
  font-family: Arial;
  
  /* الصورة كخلفية كاملة */
  background-image: url('foto-de-portada.JPG');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  min-height: 100vh;
}

/* طبقة شفافة فوق الخلفية باش النص يبان مليح */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.4);  /* شفافية خفيفة (قليل من السواد) */
  z-index: -1;
}

.container {
  padding: 40px;
  position: relative;
  z-index: 1;
}

video {
  width: 80%;          
  max-height: 400px;   
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  border: 3px solid rgba(255,255,255,0.3);
}

h1 {
  margin-top: 40px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  background: rgba(0,0,0,0.3);
  padding: 15px;
  border-radius: 50px;
  display: inline-block;
  backdrop-filter: blur(5px);
}
</style>
</head>

<body>

<div class="container">

<h1>اليوم عيد.. فهل لي في العيد لُقياك       ❤️</h1>

<video autoplay controls>
  <source src="eid.mp4" type="video/mp4">
</video>

<h1 style="margin-top:40px;">
يا مَنِيَّةَ الروح، إنَّ العيد لُقياك💫</h1>

</div>

</body>
</html>
