<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>asbab 3lach ana kanb4ik </title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a96e;
    --gold-dim: rgba(201,169,110,0.18);
    --star-white: #f0eaff;
    --nebula-1: #1a0a2e;
    --nebula-2: #0d0520;
    --nebula-3: #06020f;
    --text-bright: #f5f0ff;
    --text-dim: rgba(245,240,255,0.55);
  }

  html, body {
    width: 100%; min-height: 100vh;
    background: var(--nebula-3);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--text-bright);
    overflow-x: hidden;
    cursor: default;
  }

  /* ── CANVAS ── */
  #sky { position: fixed; inset: 0; z-index: 0; }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 60px 20px 20px;
    pointer-events: none;
  }
  header .subtitle {
    font-family: 'Cinzel', serif;
    font-size: clamp(10px, 1.8vw, 13px);
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 1.2s 0.3s forwards;
  }
  header h1 {
    font-size: clamp(36px, 7vw, 72px);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: 0.04em;
    color: var(--text-bright);
    opacity: 0;
    animation: fadeUp 1.2s 0.6s forwards;
  }
  header h1 em {
    font-style: italic;
    color: var(--gold);
  }
  header .intro {
    font-size: clamp(14px, 2vw, 17px);
    font-style: italic;
    color: var(--text-dim);
    margin-top: 14px;
    opacity: 0;
    animation: fadeUp 1.2s 0.9s forwards;
  }

  /* ── CONSTELLATION AREA ── */
  #constellation-wrap {
    position: relative; z-index: 10;
    width: 100%; max-width: 960px;
    margin: 40px auto 0;
    padding: 0 20px;
  }
  #constellation-svg {
    width: 100%; height: auto;
    display: block;
    filter: drop-shadow(0 0 18px rgba(201,169,110,0.08));
  }

  /* ── STARS ── */
  .star-group { cursor: pointer; }
  .star-glow {
    fill: var(--gold);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .star-core {
    fill: var(--star-white);
    transition: fill 0.3s, r 0.3s;
  }
  .star-group:hover .star-glow { opacity: 1; }
  .star-group:hover .star-core { fill: var(--gold); }
  .star-group.visited .star-core { fill: var(--gold); opacity: 0.85; }
  .star-label {
    fill: rgba(245,240,255,0.45);
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 0.12em;
    pointer-events: none;
    transition: fill 0.3s;
  }
  .star-group:hover .star-label,
  .star-group.visited .star-label { fill: var(--gold); }
  .constellation-line {
    stroke: rgba(201,169,110,0.18);
    stroke-width: 0.8;
    stroke-dasharray: 4 4;
    fill: none;
    pointer-events: none;
  }

  /* ── MODAL ── */
  #modal-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(6,2,15,0.82);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  #modal-backdrop.open { opacity: 1; pointer-events: all; }
  #modal {
    background: linear-gradient(145deg, #160b2e, #0d0520);
    border: 0.5px solid rgba(201,169,110,0.35);
    border-radius: 4px;
    padding: 44px 48px;
    max-width: 480px; width: 90%;
    text-align: center;
    transform: scale(0.92) translateY(12px);
    transition: transform 0.4s;
    position: relative;
    box-shadow: 0 0 60px rgba(201,169,110,0.08), inset 0 0 40px rgba(201,169,110,0.03);
  }
  #modal-backdrop.open #modal { transform: scale(1) translateY(0); }

  #modal-num {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 10px;
  }
  #modal-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: rgba(201,169,110,0.6);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  #modal-divider {
    width: 40px; height: 1px;
    background: var(--gold);
    opacity: 0.4;
    margin: 0 auto 24px;
  }
  #modal-text {
    font-size: clamp(18px, 3vw, 24px);
    font-weight: 300;
    font-style: italic;
    line-height: 1.6;
    color: var(--text-bright);
    letter-spacing: 0.01em;
  }
  #modal-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; cursor: pointer;
    color: rgba(201,169,110,0.5);
    font-size: 22px; line-height: 1;
    transition: color 0.2s;
    font-family: 'Cormorant Garamond', serif;
  }
  #modal-close:hover { color: var(--gold); }
#modal-photo-wrap {
  display: none;
  margin-bottom: 22px;
}
#modal-photo-wrap.visible { display: block; }
#modal-photo {
  width: 100%; max-height: 280px;
  object-fit: cover;
  border-radius: 3px;
  border: 0.5px solid rgba(201,169,110,0.25);
  display: block;
}
.star-group.has-photo .star-core { fill: #e8c8ff; }
.star-group.has-photo.visited .star-core { fill: #c97fe8; }
  /* ── COUNTER ── */
  #counter {
    position: relative; z-index: 10;
    text-align: center;
    padding: 50px 20px 30px;
    opacity: 0;
    animation: fadeUp 1.2s 1.4s forwards;
  }
  #counter .num {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 5vw, 48px);
    color: var(--gold);
    letter-spacing: 0.06em;
  }
  #counter .label {
    font-size: clamp(12px, 2vw, 15px);
    font-style: italic;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* ── FOOTER ── */
  footer {
    position: relative; z-index: 10;
    text-align: center;
    padding: 30px 20px 60px;
    font-style: italic;
    font-size: clamp(13px, 2vw, 16px);
    color: rgba(245,240,255,0.3);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.9; }
    50%       { opacity: 0.3; }
  }
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.6; r: 10; }
    50%       { opacity: 1;   r: 13; }
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<header>
  <p class="subtitle">Just for Yassmine </p>
  <h1>asbab elach <br><em>kanb4i Yassmine</em></h1>
  <p class="intro">kola njema fiha wahed sabab 3lach ana kanb4ik <br>9isi kola wehda aytla3 sabab</p>
</header>

<div id="constellation-wrap">
  <svg id="constellation-svg" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="counter">
  <p class="num"><span id="visited-count">0</span> / <span id="total-count">0</span></p>
  <p class="label">njmat li chfeti db </p>
</div>

<footer>hadchi msayeb bkol lhob lhbibti Yassmine w bnti ❤️ &nbsp;✦</footer>

<div id="modal-backdrop">
  <div id="modal">
    <button id="modal-close" aria-label="Cerrar">×</button>
    <p id="modal-num"></p>
    <p id="modal-name"></p>
    <div id="modal-divider"></div>
    <div id="modal-photo-wrap">
  <img id="modal-photo" src="" alt="Foto especial" />
</div>
    <p id="modal-text"></p>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  ✦  EDITA AQUÍ  ✦
//  Cambia "Tu nombre" y añade/quita razones
// ════════════════════════════════════════════
const CONFIG = {
  nombreNovia: "Yassmine",      // ← pon su nombre aquí
  nombreTuyo:  "Tarik",           // ← pon tu nombre aquí
  razones: [
    { nombre: "de7ktek",       texto: "de7ka dyalk hiya a7san haja chafet 3yni ahbiba w kantmna tb9ay dima da7eka w fre7na " ,foto:null},
    { nombre: "kifach katfkeri ",     texto: "3ndki 3e9liya zwina w kay3jbni kifach kathderi w kifach katfkri " ,foto:null},
    { nombre: "bzazlk",    texto: "kay3jboni bzazlki w homa mn asbab li khlawni nb4ik " ,foto:null},
    { nombre: "che3rki ",      texto: "che3rki twil retab li atb9ay t4tay bih w dirili dik l4deba li 9oltili dik lmra fach konti 7daya hhhh",foto : "foto1.jpeg" },
    { nombre: "termtk",    texto: "kat3jbni tremtk wa3era " ,foto:null},
    { nombre: "3winatki ",      texto: "3winatki li kaylm3o fach katkoni 7daya ",foto: "foto2.jpeg" },
    { nombre: "de7ktki 3awtani",     texto: "ms had lmra fach kadiri dik lbtisama dyal l7ob li fach kankon 7dak w kaykono ta 3yniki kaylm3o",foto: "foto3.jpeg" },
    { nombre: "tbonki",  texto: "w tab3an maymknch mandkroch tbonki l4zal l4ozi lwa3er a33333 n3deo hhhh ",foto:null },
    { nombre: "ydik ",      texto: "ydik zwinin w l7nanin fach kay9soli f wejhi w la fach kay3tiwni chi terf dyal djaj machi nachef wla fach kanboshom li ma3raftch 3lach b4ithom ms ydik wa3rin " ,foto: "foto4.jpeg"},
    { nombre: "ri7tk ",      texto: "ri7a li katkon fiki fach naboski mn 3n9ek wla kan9reb lik wla kan3ne9k li makrahtch kon kantfseha f3awet lhwa ahbiba ri7tek wa3era" ,foto: "foto5.jpeg"},
    { nombre: "kerchk",    texto: "krechki lwa3ra li b4it n7et rasi 3liha chi nhar w ykon fiha weldi kayfrkel ldakhel " ,foto: "foto6.jpeg"},
    { nombre: "fkhidatk",  texto: "fkhadek fach kankhchi ydi f t9ti3a dyal srwal w kan9ishom wla fach katkoni galsa 3ndi ",foto:null },
    { nombre: "rejlik",    texto: "rjilatki zwinin w dik lwinat lwa3rin li kadirilihom wli makhlitinich nswerhom 7it banolki 3wjin ya l3aweja hhhhh",foto:null },
    { nombre: "kolchi ",       texto: "makaynach chi haja fik ahbiba makat3jbnich wla manb4ihach fiki kolki wa3ra kanb4ik " ,foto:null},
  ]
};
// ════════════════════════════════════════════

// ── Background starfield ──
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H, stars = [];

function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = document.body.scrollHeight;
  buildStars();
}

function buildStars() {
  stars = [];
  const n = Math.floor((W * H) / 3000);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.2,
      alpha: Math.random() * 0.6 + 0.15,
      speed: Math.random() * 0.015 + 0.005,
      phase: Math.random() * Math.PI * 2
    });
  }
}

let t = 0;
function drawBg() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#06020f';
  ctx.fillRect(0, 0, W, H);

  // nebula blobs
  const blobs = [
    { x: W*0.2, y: H*0.25, r: W*0.3, c: 'rgba(80,20,120,0.06)' },
    { x: W*0.75, y: H*0.6, r: W*0.28, c: 'rgba(40,10,90,0.07)' },
    { x: W*0.5, y: H*0.1,  r: W*0.2, c: 'rgba(100,30,60,0.05)' },
  ];
  blobs.forEach(b => {
    const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
    g.addColorStop(0, b.c);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  });

  t += 0.008;
  stars.forEach(s => {
    const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 80 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(240,235,255,${a})`;
    ctx.fill();
  });
  requestAnimationFrame(drawBg);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
drawBg();

// ── Build constellation SVG ──
const svg = document.getElementById('constellation-svg');
const NS = 'http://www.w3.org/2000/svg';
const razones = CONFIG.razones;
const total = razones.length;
document.getElementById('total-count').textContent = total;

// Lay out stars in a loose organic pattern
function layoutStars(n, W, H) {
  const pts = [];
  const cols = Math.ceil(Math.sqrt(n * 1.6));
  const rows = Math.ceil(n / cols);
  const cellW = W / cols;
  const cellH = H / rows;
  const used = [];
  for (let i = 0; i < n; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = cellW * col + cellW * (0.2 + Math.random() * 0.6);
    const y = cellH * row + cellH * (0.2 + Math.random() * 0.6);
    pts.push({ x: Math.round(x), y: Math.round(y) });
  }
  return pts;
}

const vW = 900, vH = 560;
const pad = 60;
const positions = layoutStars(total, vW - pad*2, vH - pad*2).map(p => ({
  x: p.x + pad, y: p.y + pad
}));

// Draw constellation lines (connect nearest neighbours lightly)
function nearestNeighbourLines(pts) {
  const lines = [];
  pts.forEach((a, i) => {
    let best = Infinity, bestJ = -1;
    pts.forEach((b, j) => {
      if (i === j) return;
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      if (d < best) { best = d; bestJ = j; }
    });
    if (bestJ >= 0 && !lines.find(l => (l[0]===i&&l[1]===bestJ)||(l[0]===bestJ&&l[1]===i))) {
      lines.push([i, bestJ]);
    }
  });
  // add a few longer connections for visual richness
  pts.forEach((a, i) => {
    const dists = pts.map((b,j) => ({ j, d: Math.hypot(a.x-b.x,a.y-b.y) }))
      .filter(x => x.j !== i)
      .sort((a,b) => a.d - b.d);
    const second = dists[1];
    if (second && !lines.find(l => (l[0]===i&&l[1]===second.j)||(l[0]===second.j&&l[1]===i))) {
      lines.push([i, second.j]);
    }
  });
  return lines;
}

const lines = nearestNeighbourLines(positions);
lines.forEach(([a, b]) => {
  const el = document.createElementNS(NS, 'path');
  el.setAttribute('class', 'constellation-line');
  el.setAttribute('d', `M${positions[a].x},${positions[a].y} L${positions[b].x},${positions[b].y}`);
  svg.appendChild(el);
});

// Draw stars
const starSizes = [6, 7, 8, 5, 9, 6, 7, 8, 5, 7, 6, 8, 7, 6, 5];
let visitedCount = 0;

positions.forEach((pos, i) => {
  const r = starSizes[i % starSizes.length];
  const g = document.createElementNS(NS, 'g');
  g.setAttribute('class', 'star-group');
  g.setAttribute('data-index', i);
  g.setAttribute('tabindex', '0');
  g.setAttribute('role', 'button');
  g.setAttribute('aria-label', razones[i].nombre);

  // glow
  const glow = document.createElementNS(NS, 'circle');
  glow.setAttribute('class', 'star-glow');
  glow.setAttribute('cx', pos.x); glow.setAttribute('cy', pos.y);
  glow.setAttribute('r', r + 9);

  // core
  const core = document.createElementNS(NS, 'circle');
  core.setAttribute('class', 'star-core');
  core.setAttribute('cx', pos.x); core.setAttribute('cy', pos.y);
  core.setAttribute('r', r);

  // 4-point sparkle
  const sparkle = document.createElementNS(NS, 'path');
  const s = r * 0.5;
  sparkle.setAttribute('d', `M${pos.x},${pos.y-r*1.7} L${pos.x+s*0.3},${pos.y-s*0.3} L${pos.x+r*1.7},${pos.y} L${pos.x+s*0.3},${pos.y+s*0.3} L${pos.x},${pos.y+r*1.7} L${pos.x-s*0.3},${pos.y+s*0.3} L${pos.x-r*1.7},${pos.y} L${pos.x-s*0.3},${pos.y-s*0.3} Z`);
  sparkle.setAttribute('fill', 'rgba(240,234,255,0.6)');
  sparkle.setAttribute('pointer-events', 'none');

  // label
  const label = document.createElementNS(NS, 'text');
  label.setAttribute('class', 'star-label');
  label.setAttribute('x', pos.x);
  label.setAttribute('y', pos.y + r + 14);
  label.setAttribute('text-anchor', 'middle');
  label.textContent = razones[i].nombre;

  g.appendChild(glow);
  g.appendChild(core);
  g.appendChild(sparkle);
  g.appendChild(label);
  svg.appendChild(g);

  function openModal() {
    if (!g.classList.contains('visited')) {
      g.classList.add('visited');
      visitedCount++;
      document.getElementById('visited-count').textContent = visitedCount;
    }
    document.getElementById('modal-num').textContent = `✦  ${i+1} de ${total}  ✦`;
    document.getElementById('modal-name').textContent = razones[i].nombre;
    document.getElementById('modal-text').textContent = razones[i].texto;
    const photoWrap = document.getElementById('modal-photo-wrap');
const photoEl   = document.getElementById('modal-photo');
if (razones[i].foto) {
  photoEl.src = razones[i].foto;
  photoWrap.classList.add('visible');
} else {
  photoEl.src = '';
  photoWrap.classList.remove('visible');
}
document.getElementById('modal-backdrop').classList.add('open');
  }

  g.addEventListener('click', openModal);
  g.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(); });
});

// Add a twinkle animation to random stars
setTimeout(() => {
  document.querySelectorAll('.star-core').forEach((c, i) => {
    c.style.animation = `twinkle ${2 + Math.random()*3}s ${Math.random()*2}s infinite`;
  });
}, 1500);

// Modal close
const backdrop = document.getElementById('modal-backdrop');
document.getElementById('modal-close').addEventListener('click', () => backdrop.classList.remove('open'));
backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') backdrop.classList.remove('open'); });

// Resize canvas on scroll
window.addEventListener('scroll', () => {
  const newH = document.body.scrollHeight;
  if (newH !== H) { H = canvas.height = newH; buildStars(); }
});
</script>
</body>
</html>
