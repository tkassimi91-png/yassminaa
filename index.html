<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Countdown to 6 June</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0a0e;
      --surface: #1a1220;
      --rose: #e8536a;
      --rose-light: #f7a0af;
      --cream: #f5ede4;
      --gold: #c9a96e;
      --muted: #7a6b78;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
       background: var(--bg);
        background-image: url('batman.gif');
       background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background petals */
    .bg-petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .petal {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(232,83,106,0.15); top: -100px; right: -80px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(201,169,110,0.1); bottom: -80px; left: -60px; }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 4rem;
      max-width: 700px;
      width: 90%;
    }

    .label-top {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 400;
      line-height: 1.2;
      color: var(--cream);
      margin-bottom: 0.4rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    h1 em {
      font-style: italic;
      color: var(--rose-light);
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    /* Timer blocks */
    .timer {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 3.5rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
    }

    .time-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 700;
      color: var(--cream);
      line-height: 1;
      position: relative;
      transition: transform 0.15s ease;
    }

    .time-num.bump {
      transform: scale(1.12);
    }

    .time-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .sep {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: var(--rose);
      align-self: center;
      margin-bottom: 1.2rem;
      opacity: 0.5;
    }

    /* Kisses section */
    .kisses-section {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
    }

    .kisses-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 1.5rem;
    }

    .kisses-label {
      font-size: 0.8rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .kisses-count {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--rose), var(--rose-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      position: relative;
    }

    .kisses-sub {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.5rem;
      font-style: italic;
    }

    /* Floating heart burst on midnight */
    .heart-burst {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      display: none;
    }

    .burst-heart {
      position: absolute;
      font-size: 2rem;
      animation: burst 2s ease forwards;
    }

    @keyframes burst {
      0%   { transform: translate(0,0) scale(0); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(1.5); opacity: 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Arrived state */
    .arrived {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--rose-light);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:0;pointer-events:none;"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Falling petals -->
  <div class="bg-petals" id="petals"></div>

  <div class="card">
    <div class="label-top">Compte à rebours pour habibti Yassmine bohdeha </div>
    <h1>Jusqu'au <em>6 Août 2026</em></h1>
    <div class="subtitle">6 août 2026 · Le jour tant attendu</div>

    <div class="timer" id="timer">
      <div class="time-block">
        <div class="time-num" id="days">--</div>
        <div class="time-label">Jours</div>
      </div>
      <div class="sep">·</div>
      <div class="time-block">
        <div class="time-num" id="hours">--</div>
        <div class="time-label">Heures</div>
      </div>
      <div class="sep">·</div>
      <div class="time-block">
        <div class="time-num" id="minutes">--</div>
        <div class="time-label">Minutes</div>
      </div>
      <div class="sep">·</div>
      <div class="time-block">
        <div class="time-num" id="seconds">--</div>
        <div class="time-label">Secondes</div>
      </div>
    </div>

    <div class="kisses-section">
      <div class="kisses-divider"></div>
      <div class="kisses-label">💋 Baisers qui s'accumulent</div>
      <div class="kisses-count" id="kisses">0</div>
      <div class="kisses-sub">chaque jour qui passe = un baiser de plus</div>
    </div>
  </div>

  <div class="heart-burst" id="heartBurst"></div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const TARGET = new Date('2026-08-06T00:00:00');
  // Reference start: today at midnight (page load day)
  // Kisses = days elapsed from today UNTIL target
  // Each day that passes TOWARD the target adds 1 kiss.
  // So kisses = (total days) - (days remaining)
  // We use June 6 as the end. Start counting from "now".
  // Actually: kisses = days elapsed since today at the START of countdown.
  // Let's define: kisses = (totalDays - daysLeft)
  // totalDays = total days between now (at load) and target.

  // START_DATE fixe = nhar li bdat fiha l page (ma tbdalch)
  const START_DATE = new Date('2026-05-19T00:00:00');
  const TARGET_START = new Date(TARGET);
  TARGET_START.setHours(0,0,0,0);

  const TOTAL_DAYS = Math.round((TARGET_START - START_DATE) / 86400000);

  // ── PETALS ───────────────────────────────────────────────
  const petalsEl = document.getElementById('petals');
  const EMOJIS = ['🌸','🌺','💮','🏵️','🌹'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    petalsEl.appendChild(p);
  }

  // ── TIMER ────────────────────────────────────────────────
  const dEl = document.getElementById('days');
  const hEl = document.getElementById('hours');
  const mEl = document.getElementById('minutes');
  const sEl = document.getElementById('seconds');
  const kissEl = document.getElementById('kisses');

  function bump(el) {
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 200);
  }

  let prevS = -1, prevD = -1;

  function tick() {
    const now = new Date();
    const diff = TARGET - now;

    if (diff <= 0) {
      document.getElementById('timer').innerHTML = '<div class="arrived">🌹 C\'est aujourd\'hui ! 🌹</div>';
      kissEl.textContent = TOTAL_DAYS + ' 💋';
      return;
    }

    const totalSecs = Math.floor(diff / 1000);
    const s = totalSecs % 60;
    const totalMin = Math.floor(totalSecs / 60);
    const min = totalMin % 60;
    const totalH = Math.floor(totalMin / 60);
    const h = totalH % 24;
    const d = Math.floor(totalH / 24);

    const pad = n => String(n).padStart(2, '0');

    if (s !== prevS) { sEl.textContent = pad(s); bump(sEl); prevS = s; }
    hEl.textContent = pad(h);
    mEl.textContent = pad(min);

    if (d !== prevD) {
      dEl.textContent = pad(d);
      bump(dEl);
      prevD = d;

      // kisses = days elapsed = TOTAL_DAYS - d
      const kisses = Math.max(0, TOTAL_DAYS - d);
      animateKisses(kisses);

      // midnight heart burst
      if (d < TOTAL_DAYS) triggerHeartBurst();
    }
  }

  // Smooth kiss counter
  let displayedKisses = 0;
  function animateKisses(target) {
    if (displayedKisses === target) return;
    const step = target > displayedKisses ? 1 : -1;
    const interval = setInterval(() => {
      displayedKisses += step;
      kissEl.textContent = displayedKisses;
      if (displayedKisses === target) clearInterval(interval);
    }, 60);
  }

  function triggerHeartBurst() {
    const burst = document.getElementById('heartBurst');
    burst.innerHTML = '';
    burst.style.display = 'block';
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('div');
      h.className = 'burst-heart';
      h.textContent = ['💋','❤️','🌹','💕','💗'][Math.floor(Math.random()*5)];
      const angle = (Math.PI * 2 * i) / 18;
      const dist = 120 + Math.random() * 180;
      h.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      h.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      h.style.left = '50%';
      h.style.top = '50%';
      h.style.animationDelay = Math.random() * 0.4 + 's';
      burst.appendChild(h);
    }
    setTimeout(() => { burst.style.display = 'none'; }, 2500);
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
