
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question</title>

<style>
body {
  margin: 0;
  background: linear-gradient(black, purple);
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Box */
.container {
  text-align: center;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  cursor: pointer;
}

/* Card result */
.card {
  display: none;
  background: rgba(0,0,0,0.9);
  padding: 20px;
  border-radius: 20px;
  margin-top: 20px;
  animation: pop 0.5s ease;
}

@keyframes pop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}

.closeBtn {
  background: red;
  color: white;
}
</style>

</head>
<body>

<div class="container">
  <h1>🤔 1 + 1 = ?</h1>

  <input type="text" id="answer" placeholder=" ktbi hna ljawab ">
  <br>
  <button onclick="check()">check</button>

  <div id="card" class="card">
    <h2 id="msg"></h2>
    <button class="closeBtn" onclick="goNext()">Close</button>
  </div>
</div>

<script>
let correct = false;

function check() {
  let ans = document.getElementById("answer").value;
  let card = document.getElementById("card");
  let msg = document.getElementById("msg");

  card.style.display = "block";

  if (ans == "2") {
    msg.innerHTML = "❌ لاااا 😂 1+1 = 69 و شي وليد";
    correct = true;
  } else {
    msg.innerHTML = "wach 9arya f z7am 1+1 ma3arfach chhal !!";
    correct = false;
  }
}

function goNext() {
  let card = document.getElementById("card");

  if (correct) {
    window.location.href = "Intro.html";
  } else {
    card.style.display = "none";
  }
}
</script>

</body>
</html>
