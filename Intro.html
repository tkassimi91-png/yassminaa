
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Calculator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  color: white;
}

/* Background Video */
video.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* Calculator */
.calculator {
  position: relative;
  z-index: 1;
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 20px;
  width: 360px;
  margin: 50px auto;
}

.display {
  background: black;
  padding: 10px;
  border-radius: 10px;
  min-height: 40px;
  text-align: right;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* كان 6 → نقصنا باش يكبرو */
  gap: 10px; /* زيدنا المسافة */
  margin-top: 10px;
  
}

button {
  padding: 18px;       /* كان 10px → كبرناه */
  font-size: 18px;     /* باش يبان واضح */
  border: none;
  border-radius: 12px; /* شوية rounded */
  cursor: pointer;
}


.letter { background: #444; color: white; }
.operator { background: orange; }
.equal { background: green; }
.clear { background: red; }
.special { background: purple; color: white; }

/* Card popup */
.card {
  display: none;
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.9);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  z-index: 2;
  animation: pop 0.5s ease;
}

@keyframes pop {
  from { transform: translate(-50%, -50%) scale(0); }
  to { transform: translate(-50%, -50%) scale(1); }
}

.card button {
  margin-top: 15px;
  padding: 10px 20px;
  border-radius: 10px;
  background: pink;
  color: white;
  cursor: pointer;
}
@media (max-width: 500px) {
  .calculator {
    width: 90%;   /* ياخذ العرض كامل */
    padding: 15px;
  }

  button {
    padding: 20px;
    font-size: 20px;
  }
}
</style>

</head>
<body>
<div id="lockScreen" style="
position: fixed;
top:0; left:0;
width:100%; height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
">

  <h2>🔒 chkon nti ?</h2>
  <input type="password" id="passwordInput" placeholder="password" style="padding:10px; border-radius:10px;">
  <br>
  <button onclick="checkPassword()">Enter</button>

  <p id="error" style="color:red;"></p>

</div>

<!-- Background video -->
<video class="bg" autoplay loop muted>
  <source src="7na-love.mp4" type="video/mp4">
</video>

<div class="calculator">
  <div id="display" class="display"></div>

  <div class="buttons" id="buttons"></div>

  <button class="equal" onclick="calculate()">=</button>
  <button class="clear" onclick="clearDisplay()">C</button>
</div>

<!-- Card popup -->
<div id="card" class="card">
  <h2 id="msg">❤️ 7OB ❤️</h2>
  <button onclick="goVideo()">🎬 Watch Video</button>
  <br>
  <button onclick="goAI()">🤖 AI Judge</button>
</div>

<script>
function checkPassword() {
  let pass = document.getElementById("passwordInput").value;
  let error = document.getElementById("error");

  if (pass === "ana mrat tarik") { // بدلها بالباسورد اللي بغيتي
    document.getElementById("lockScreen").style.display = "none";
  } else {
    error.innerHTML = "sir t9awed nta machi yassmine :/";
  }
}
let display = document.getElementById("display");
let buttonsDiv = document.getElementById("buttons");
let card = document.getElementById("card");
let msg = document.getElementById("msg");

// جميع الحروف + أرقام
let chars = "0123456789".split("");
chars.forEach(c => {
  let btn = document.createElement("button");
  btn.innerText = c;
  btn.className = "letter";
  btn.onclick = () => display.innerHTML += c;
  buttonsDiv.appendChild(btn);
});

// زر +
let plusBtn = document.createElement("button");
plusBtn.innerText = "+";
plusBtn.className = "operator";
plusBtn.onclick = () => display.innerHTML += "+";
buttonsDiv.appendChild(plusBtn);

// أزرار خاصة TARIK و YASSMINE
let tarikBtn = document.createElement("button");
tarikBtn.innerText = "TARIK";
tarikBtn.className = "special";
tarikBtn.onclick = () => display.innerHTML += "TARIK";
buttonsDiv.appendChild(tarikBtn);

let yassmineBtn = document.createElement("button");
yassmineBtn.innerText = "YASSMINE";
yassmineBtn.className = "special";
yassmineBtn.onclick = () => display.innerHTML += "YASSMINE";
buttonsDiv.appendChild(yassmineBtn);

function clearDisplay() {
  display.innerHTML = "";
  card.style.display = "none";
}

// Calculate
function calculate() {
  let input = display.innerHTML;

  if (input.includes("*") || input.includes("-") || input.includes("/")) {
    alert("4ir + li khdama hhhh");
    return;
  }

  if (input === "TARIK+YASSMINE") {
    msg.innerHTML = "TARIK+YASSMINE = love hhhh \n (Kanbghek)";
    card.style.display = "block";
  } else if (input === "YASSMINE+TARIK"){
    alert("ma7chmtich katseb9i smytki 9bel mni ");
  }
  else {
    alert("la la sma7liya hadchi ma9ritoch hhhhh ");
  }
}

// Go video
function goVideo() {
  window.location.href = "video.html"; // صفحة الفيديو
}
function goAI() {
  let input = display.innerHTML;
  window.location.href = "ai.html?names=" + input;
}
</script>

</body>
</html>
