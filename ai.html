<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Judge</title>

<style>
body {
  margin: 0;
 
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
  text-align: center;

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  min-height: 100vh;
}
video.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}
/* Loading text */
#loading {
  font-size: 22px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

/* Result card */
.card {
  display: none;
  background: black;
  padding: 25px;
  border-radius: 20px;
  animation: pop 0.5s ease;
}

@keyframes pop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: purple;
  color: white;
  cursor: pointer;
  font-size: 16px;
}
</style>

</head>
<body>
<video class="bg" autoplay loop muted>
  <source src="yas+tar.mov" type="video/mp4">
</video>
<h2 id="loading">🤖 جاري تحليل الأسماء...</h2>

<div id="card" class="card">
  <h2 id="result"></h2>
  <button onclick="goBack()">🔙 رجوع</button>
</div>

<script>
// نقدر نجيبو الاسم من URL (اختياري)
let params = new URLSearchParams(window.location.search);
let names = params.get("names"); // مثال: TARIK+YASSMINE

let loadingText = document.getElementById("loading");
let card = document.getElementById("card");
let result = document.getElementById("result");

// رسائل loading
let steps = [
  "🤖 جاري تحليل الأسماء...",
  "❤️ جاري فحص المشاعر...",
  "😏 جاري التحقق من النية...",
  "🔥 تحليل مستوى الحب..."
];

let i = 0;

let interval = setInterval(() => {
  loadingText.innerHTML = steps[i];
  i++;
  if (i >= steps.length) i = 0;
}, 1000);

// النتائج
let messages = [
  "القاضية خطيرة طارق مهوس ب ياسمين 😔",
  "الى كنتي كتبغي طارق شطحيلو ف فيديو دب 😶 ",
  "😏 الى كنتي كتبغي طارق وريه البزازل", 
  "لو تعرفين شكثر أحبك ... بكيتي عن كل يوم فيه ما كنت أحبك ",
  " ولو تلمسين أشواق قلبي نسيتي  أمك وأبوك ولولا الإيمان ربك ",
  
];

// بعد 4 ثواني يبان الريزولت
setTimeout(() => {
  clearInterval(interval);
  loadingText.style.display = "none";
  card.style.display = "block";

  // special case
  if (names === "TARIK+YASSMINE") {
    result.innerHTML = "⚠️ النظام توقف... حب خطير جداً ❤️🔥";
  } else {
    let random = messages[Math.floor(Math.random() * messages.length)];
    result.innerHTML = random;
  }

}, 4000);

// رجوع
function goBack() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
